openapi: 3.0.3
info:
  title: 같이가는 제주 API
  description: |
    **같이가는 제주** 모바일 앱 백엔드 API 명세서입니다.

    ## 공통 응답 구조
    모든 응답은 아래 구조를 따릅니다.

    **성공:**
    ```json
    { "success": true, "code": "SUCCESS", "message": "...", "data": {} }
    ```

    **에러:**
    ```json
    { "success": false, "code": "AUTH_001", "message": "...", "data": null, "errors": [] }
    ```

    ## 인증
    Access Token (JWT)을 `Authorization: Bearer {token}` 헤더로 전달합니다.
    만료 시 `/api/v1/auth/token/refresh`로 재발급하세요.
  version: 1.0.0
  contact:
    name: 같이가는 제주 팀
servers:
  - url: http://localhost:8080
    description: 개발 서버
  - url: https://api.jeju.app
    description: 운영 서버 (예정)

tags:
  - name: Auth
    description: 인증 (회원가입, 로그인, 소셜 로그인, 토큰 관리)
  - name: User
    description: 사용자 (온보딩, 프로필 조회/수정, 회원 탈퇴)
  - name: Itinerary
    description: 일정 (추천, 상세, 저장, 직접 만들기, 공유)
  - name: Place
    description: 장소 (탐색, 검색, 상세, 찜)
  - name: Review
    description: 후기 (작성, 목록 조회, 삭제)
  - name: Notification
    description: 알림 (목록, 읽음 처리, 삭제)
  - name: Report
    description: 신고 / 정보 정정

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── 공통 응답 래퍼 ──────────────────────────────────────────
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: 요청이 성공적으로 처리되었습니다.
        data:
          nullable: true

    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: AUTH_001
        message:
          type: string
          example: 이메일 또는 비밀번호가 올바르지 않습니다.
        data:
          nullable: true
          example: null
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      properties:
        field:
          type: string
          example: email
        value:
          type: string
          example: not-an-email
        reason:
          type: string
          example: 올바른 이메일 형식이 아닙니다.

    PageMeta:
      type: object
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 5
        hasNext:
          type: boolean
          example: true

    # ── Auth ────────────────────────────────────────────────────
    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: Access Token 만료 시간 (초)
          example: 900

    SocialLoginResponse:
      allOf:
        - $ref: '#/components/schemas/TokenPair'
        - type: object
          properties:
            isNewUser:
              type: boolean
              description: true이면 온보딩 화면으로 이동 필요
              example: true

    # ── User ────────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        userId:
          type: integer
          example: 1
        email:
          type: string
          example: user@jeju.com
        nickname:
          type: string
          example: 제주나그네
        provider:
          type: string
          enum: [EMAIL, KAKAO, GOOGLE]
          example: EMAIL
        companion:
          type: string
          enum: [SOLO, COUPLE, FAMILY, FRIENDS]
          example: COUPLE
        preference:
          type: string
          enum: [INDOOR, OUTDOOR, BOTH]
          example: OUTDOOR
        mobility:
          type: string
          enum: [WHEELCHAIR, STROLLER, ELDERLY, NORMAL]
          example: NORMAL
        savedItineraryCount:
          type: integer
          example: 3
        likedPlaceCount:
          type: integer
          example: 7

    # ── Itinerary ───────────────────────────────────────────────
    ItinerarySummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: 성산일출봉 & 섭지코지 코스
        thumbnail:
          type: string
          example: https://...
        places:
          type: integer
          example: 5
        estimatedTime:
          type: integer
          description: 예상 소요 시간 (분)
          example: 360
        accessibilityScore:
          type: integer
          description: 무장애 접근성 점수 (0~100)
          example: 92

    Accessibility:
      type: object
      properties:
        hasRamp:
          type: boolean
          example: true
        hasElevator:
          type: boolean
          example: false
        hasAccessibleToilet:
          type: boolean
          example: true
        hasRestZone:
          type: boolean
          example: false
        hasAccessibleParking:
          type: boolean
          example: true

    PlaceInItinerary:
      type: object
      properties:
        id:
          type: integer
          example: 10
        name:
          type: string
          example: 성산일출봉
        order:
          type: integer
          example: 1
        day:
          type: integer
          example: 1
        lat:
          type: number
          format: double
          example: 33.459
        lng:
          type: number
          format: double
          example: 126.942
        estimatedMinutes:
          type: integer
          example: 90
        accessibility:
          $ref: '#/components/schemas/Accessibility'

    ItineraryDetail:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: 성산일출봉 & 섭지코지 코스
        days:
          type: integer
          example: 1
        estimatedTime:
          type: integer
          example: 360
        savedCount:
          type: integer
          example: 142
        isSaved:
          type: boolean
          example: false
        places:
          type: array
          items:
            $ref: '#/components/schemas/PlaceInItinerary'

    # ── Place ───────────────────────────────────────────────────
    PlaceSummary:
      type: object
      properties:
        id:
          type: integer
          example: 10
        name:
          type: string
          example: 성산일출봉
        category:
          type: string
          enum: [NATURE, FOOD, ACCOMMODATION, CULTURE, SHOPPING]
          example: NATURE
        address:
          type: string
          example: 제주 서귀포시 성산읍...
        thumbnail:
          type: string
          example: https://...
        accessibility:
          $ref: '#/components/schemas/Accessibility'
        isLiked:
          type: boolean
          example: false

    PlaceDetail:
      allOf:
        - $ref: '#/components/schemas/PlaceSummary'
        - type: object
          properties:
            tel:
              type: string
              example: 064-783-0959
            lat:
              type: number
              example: 33.459
            lng:
              type: number
              example: 126.942
            openTime:
              type: string
              example: "07:00"
            closeTime:
              type: string
              example: "20:00"
            images:
              type: array
              items:
                type: string
            reviewCount:
              type: integer
              example: 24
            avgRating:
              type: number
              format: float
              example: 4.6

    # ── Review ──────────────────────────────────────────────────
    ReviewItem:
      type: object
      properties:
        id:
          type: integer
          example: 55
        nickname:
          type: string
          example: 제주나그네
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        content:
          type: string
          example: 접근성이 정말 좋아요!
        imageUrls:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
          example: 2026-04-08T10:00:00
        isOwner:
          type: boolean
          example: false

    # ── Notification ────────────────────────────────────────────
    NotificationItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        type:
          type: string
          enum: [WEATHER_ALERT, ITINERARY_SAVED, REVIEW_COMMENT, SYSTEM]
          example: WEATHER_ALERT
        title:
          type: string
          example: 날씨 변화 알림
        body:
          type: string
          example: 내일 일정에 비가 예상됩니다.
        isRead:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: 2026-04-08T09:00:00

  responses:
    Unauthorized:
      description: Access Token 만료 또는 유효하지 않음 (AUTH_003)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            success: false
            code: AUTH_003
            message: Access Token이 만료되었습니다.
            data: null
            errors: null

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    BadRequest:
      description: 유효하지 않은 입력값 (COMMON_001)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

# ════════════════════════════════════════════════════════════════
# PATHS
# ════════════════════════════════════════════════════════════════
paths:

  # ── Auth ─────────────────────────────────────────────────────
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: 이메일 회원가입
      description: 이메일, 비밀번호로 신규 계정을 생성합니다. 가입 후 인증 이메일이 자동 발송됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@jeju.com
                password:
                  type: string
                  description: 영문 + 숫자 + 특수문자 포함, 8자 이상
                  example: Password1!
      responses:
        '201':
          description: 회원가입 성공, 인증 이메일 발송됨
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 인증 이메일이 발송되었습니다.
                data:
                  userId: 1
                  email: user@jeju.com
                  emailVerified: false
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 이메일 로그인
      description: 이메일과 비밀번호로 로그인합니다. Access Token(15분)과 Refresh Token(7일)을 반환합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@jeju.com
                password:
                  type: string
                  example: Password1!
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 로그인 성공
                data:
                  accessToken: eyJhbGciOiJIUzI1NiJ9...
                  refreshToken: eyJhbGciOiJIUzI1NiJ9...
                  tokenType: Bearer
                  expiresIn: 900
        '401':
          description: AUTH_001 (이메일/비밀번호 불일치) 또는 AUTH_002 (이메일 미인증)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/auth/email/verify:
    post:
      tags: [Auth]
      summary: 이메일 인증 코드 확인
      description: 가입 시 발송된 6자리 인증 코드를 검증합니다. 코드 유효시간은 10분입니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                  example: user@jeju.com
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: "482910"
      responses:
        '200':
          description: 인증 완료
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 이메일 인증이 완료되었습니다.
                data:
                  emailVerified: true
        '401':
          description: AUTH_002 (코드 불일치 또는 만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/auth/email/resend:
    post:
      tags: [Auth]
      summary: 인증 이메일 재발송
      description: 인증 이메일을 재발송합니다. 기존 코드는 즉시 무효화됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@jeju.com
      responses:
        '200':
          description: 재발송 성공
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 인증 이메일이 재발송되었습니다.
                data: null
        '404':
          description: USER_002 (미가입 이메일)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/auth/password/forgot:
    post:
      tags: [Auth]
      summary: 비밀번호 찾기 이메일 발송
      description: 입력한 이메일로 비밀번호 재설정 인증 코드를 발송합니다. 코드 유효시간 10분.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@jeju.com
      responses:
        '200':
          description: 발송 성공
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 비밀번호 재설정 이메일이 발송되었습니다.
                data: null
        '404':
          description: USER_002 (가입되지 않은 이메일)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/auth/password/reset:
    post:
      tags: [Auth]
      summary: 새 비밀번호 설정
      description: 인증 코드 검증 후 새 비밀번호로 변경합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, newPassword]
              properties:
                email:
                  type: string
                  format: email
                  example: user@jeju.com
                code:
                  type: string
                  example: "482910"
                newPassword:
                  type: string
                  description: 영문 + 숫자 + 특수문자, 8자 이상
                  example: NewPass1!
      responses:
        '200':
          description: 비밀번호 변경 성공
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 비밀번호가 변경되었습니다.
                data: null
        '401':
          description: AUTH_001 (코드 불일치 또는 만료)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/auth/token/refresh:
    post:
      tags: [Auth]
      summary: Access Token 재발급
      description: Refresh Token으로 만료된 Access Token을 재발급합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiJ9...
      responses:
        '200':
          description: 재발급 성공
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 토큰이 재발급되었습니다.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiJ9...
                  tokenType: Bearer
                  expiresIn: 900
        '401':
          description: AUTH_003 (유효하지 않음) 또는 AUTH_004 (만료, 재로그인 필요)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/auth/logout:
    delete:
      tags: [Auth]
      summary: 로그아웃
      description: 현재 기기의 Refresh Token을 서버에서 무효화합니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 로그아웃 성공
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 로그아웃 되었습니다.
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/oauth/kakao/callback:
    get:
      tags: [Auth]
      summary: 카카오 소셜 로그인 콜백
      description: 카카오 OAuth2 인증 후 콜백을 처리합니다. isNewUser가 true이면 온보딩으로 이동하세요.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: 카카오 인가 코드
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: CSRF 방지용 state 값
      responses:
        '200':
          description: 소셜 로그인 성공
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 소셜 로그인 성공
                data:
                  accessToken: eyJhbGciOiJIUzI1NiJ9...
                  refreshToken: eyJhbGciOiJIUzI1NiJ9...
                  tokenType: Bearer
                  expiresIn: 900
                  isNewUser: true
        '400':
          description: AUTH_005 (카카오 인증 실패)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/auth/oauth/google/callback:
    get:
      tags: [Auth]
      summary: 구글 소셜 로그인 콜백
      description: 구글 OAuth2 인증 후 콜백을 처리합니다. isNewUser가 true이면 온보딩으로 이동하세요.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: 구글 인가 코드
      responses:
        '200':
          description: 소셜 로그인 성공
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 소셜 로그인 성공
                data:
                  accessToken: eyJhbGciOiJIUzI1NiJ9...
                  refreshToken: eyJhbGciOiJIUzI1NiJ9...
                  tokenType: Bearer
                  expiresIn: 900
                  isNewUser: false
        '400':
          description: AUTH_005 (구글 인증 실패)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ── User ─────────────────────────────────────────────────────
  /api/v1/users/nickname/check:
    get:
      tags: [User]
      summary: 닉네임 중복 확인
      description: 온보딩 단계에서 닉네임 중복 여부를 실시간 확인합니다. 클라이언트 300ms debounce 권장.
      parameters:
        - name: nickname
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 10
          description: 확인할 닉네임
      responses:
        '200':
          description: 확인 완료
          content:
            application/json:
              example:
                success: true
                code: SUCCESS
                message: 사용 가능한 닉네임입니다.
                data:
                  available: true
        '409':
          description: USER_001 (닉네임 중복)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/users/onboarding:
    post:
      tags: [User]
      summary: 온보딩 정보 저장
      description: 여행 조건(동반 유형, 실내외 선호, 이동 강도, 여행 일수), 닉네임, 약관 동의를 저장합니다.
      security:
