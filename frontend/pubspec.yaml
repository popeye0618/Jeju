name: jeju_together
description: "같이가는 제주 — 무장애 여행 일정 설계 서비스"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # ── 상태 관리 ─────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── 네트워크 ──────────────────────────────
  dio: ^5.4.3

  # ── 로컬 저장소 ───────────────────────────
  flutter_secure_storage: ^9.0.0   # JWT 토큰 안전 저장
  shared_preferences: ^2.2.3

  # ── 라우팅 ────────────────────────────────
  go_router: ^13.2.0

  # ── 지도 ─────────────────────────────────
  flutter_naver_map: ^1.2.0        # 네이버 지도 (카카오맵은 Flutter 미지원)

  # ── UI 컴포넌트 ───────────────────────────
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0                  # 스켈레톤 로딩
  lottie: ^3.1.0                  # 애니메이션
  gap: ^3.0.1                     # 간격 위젯

  # ── 유틸리티 ─────────────────────────────
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  logger: ^2.3.0
  url_launcher: ^6.2.6
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── 코드 생성 ─────────────────────────────
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.7.1

  # ── 린터 ─────────────────────────────────
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
